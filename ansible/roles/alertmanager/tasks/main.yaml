---
# Alertmanager recibe alertas disparadas por Prometheus y decide qué hacer con ellas:
# agruparlas, silenciarlas, inhibirlas, o enviarlas a uno o más receptores
# (webhook, email, Slack, PagerDuty, etc.).
#
# Separar el alerting de Prometheus tiene una razón importante: Prometheus puede
# haber múltiples instancias (alta disponibilidad), pero solo debes recibir
# una notificación, no una por instancia. Alertmanager se encarga de la deduplicación.
#
# Directorios:
#   /etc/alertmanager/      → archivo de configuración (alertmanager.yml)
#   /var/lib/alertmanager/  → datos persistidos: silences (alertas silenciadas),
#                             notification log (historial de qué se envió y cuándo)

- name: Crear directorios de Alertmanager
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ alertmanager_user }}"
    mode: "0755"
  loop:
    - "{{ alertmanager_config_dir }}"
    - "{{ alertmanager_data_dir }}"

- name: Descargar tarball de Alertmanager
  ansible.builtin.get_url:
    url: "{{ alertmanager_url }}"
    dest: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    mode: "0644"

- name: Extraer Alertmanager
  ansible.builtin.unarchive:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/alertmanager-{{ alertmanager_version }}.{{ arch }}/alertmanager"

# Alertmanager incluye dos binarios:
#   - alertmanager: el servidor
#   - amtool: CLI para gestionar alertmanager (validar config, crear silences, etc.)
- name: Instalar binarios alertmanager y amtool
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.{{ arch }}/{{ item }}"
    dest: "{{ install_dir }}/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  loop:
    - alertmanager
    - amtool
  notify: reiniciar alertmanager

# Permisos 0640 (no 0644) porque el config puede contener credenciales
# (tokens de Slack, contraseñas de SMTP, etc.). El grupo "observability"
# puede leerlo (el servicio corre como ese usuario), pero otros usuarios no.
- name: Desplegar configuración de Alertmanager
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_config_dir }}/alertmanager.yml"
    owner: "{{ alertmanager_user }}"
    group: "{{ observability_group }}"
    mode: "0640"
  notify: recargar alertmanager

- name: Instalar unidad systemd de Alertmanager
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: "0644"
  notify:
    - recargar systemd
    - reiniciar alertmanager

- name: Habilitar e iniciar Alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    state: started
    enabled: true

# amtool check-config: valida la sintaxis del alertmanager.yml.
# Al igual que promtool para Prometheus, este paso detecta errores ANTES de que
# Alertmanager intente recargar un archivo inválido.
# changed_when: false → este comando solo verifica, nunca cambia el estado del sistema.
- name: Validar configuración de Alertmanager con amtool
  ansible.builtin.command:
    cmd: "{{ install_dir }}/amtool check-config {{ alertmanager_config_dir }}/alertmanager.yml"
  changed_when: false

- name: Verificar endpoint /ready de Alertmanager
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/ready"
    status_code: 200
  retries: 5
  delay: 3
