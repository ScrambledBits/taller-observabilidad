---
- name: Actualizar caché de apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Actualizar todos los paquetes del sistema
  ansible.builtin.apt:
    upgrade: dist
  register: resultado_upgrade

- name: Instalar paquetes base
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - unzip
      - python3
      - apt-transport-https
      - ca-certificates
      - gnupg
      - software-properties-common
      - net-tools
    state: present

- name: Crear grupo de sistema para los servicios de observabilidad
  ansible.builtin.group:
    name: "{{ observability_group }}"
    system: true
    state: present

- name: Crear usuario de sistema para los servicios de observabilidad
  ansible.builtin.user:
    name: "{{ observability_user }}"
    group: "{{ observability_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

# Necesario para node_exporter (--collector.systemd) y promtail (journal scraping).
# Se hace aquí, antes de instalar ambos roles, para evitar race conditions.
- name: Agregar usuario {{ observability_user }} al grupo systemd-journal
  ansible.builtin.user:
    name: "{{ observability_user }}"
    groups: systemd-journal
    append: true

- name: Reiniciar si se actualizó el kernel
  ansible.builtin.reboot:
    reboot_timeout: 120
  when: resultado_upgrade.changed and 'linux-image' in (resultado_upgrade.stdout | default(''))
