---
# Loki es el sistema de agregación y almacenamiento de logs del taller.
# A diferencia de Elasticsearch o Splunk, Loki NO indexa el contenido de los logs,
# solo indexa las ETIQUETAS (labels). Ventajas: almacenamiento mucho más compacto,
# queries rápidas por etiqueta, pero no permite búsqueda full-text directa.
#
# Estructura de directorios creados:
#   /etc/loki/             → archivo de configuración
#   /var/lib/loki/chunks   → los logs comprimidos (archivos .gz por bloque de tiempo)
#   /var/lib/loki/rules    → reglas de métricas derivadas de logs (opcional en este taller)
#   /var/lib/loki/retention → directorio de trabajo del compactor para limpiar datos viejos
#   /var/lib/loki/index    → índice de etiquetas (qué etiquetas existen, en qué chunks)

- name: Crear directorios de Loki
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ loki_user }}"
    mode: "0755"
  loop:
    - "{{ loki_config_dir }}"
    - "{{ loki_data_dir }}"
    - "{{ loki_data_dir }}/chunks"
    - "{{ loki_data_dir }}/rules"
    - "{{ loki_data_dir }}/retention"
    - "{{ loki_data_dir }}/index"

# Loki se distribuye como archivo .zip (a diferencia de Prometheus que usa .tar.gz).
# La URL apunta a la release de GitHub, construida con la versión en defaults/main.yaml.
- name: Descargar binario de Loki
  ansible.builtin.get_url:
    url: "{{ loki_url }}"
    dest: "/tmp/loki-{{ loki_version }}.zip"
    mode: "0644"

- name: Extraer binario de Loki
  ansible.builtin.unarchive:
    src: "/tmp/loki-{{ loki_version }}.zip"
    dest: /tmp
    remote_src: true
    creates: /tmp/loki-linux-amd64

- name: Instalar binario de Loki en {{ install_dir }}
  ansible.builtin.copy:
    src: /tmp/loki-linux-amd64
    dest: "{{ install_dir }}/loki"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: reiniciar loki

# Para Loki usamos reiniciar (no recargar) porque Loki no soporta SIGHUP
# para recargar configuración — requiere reinicio completo del proceso.
- name: Desplegar configuración de Loki
  ansible.builtin.template:
    src: loki-config.yaml.j2
    dest: "{{ loki_config_dir }}/loki-config.yaml"
    owner: "{{ loki_user }}"
    mode: "0644"
  notify: reiniciar loki

- name: Instalar unidad systemd de Loki
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify:
    - recargar systemd
    - reiniciar loki

- name: Habilitar e iniciar Loki
  ansible.builtin.systemd:
    name: loki
    state: started
    enabled: true

# /ready: endpoint de Loki que responde cuando está listo para recibir logs.
# Loki puede tardar más que Prometheus en arrancar (inicializa el índice TSDB).
# Por eso usamos retries: 8 con delay: 5 (hasta 40s de espera).
- name: Verificar endpoint /ready de Loki
  ansible.builtin.uri:
    url: "http://localhost:{{ loki_port }}/ready"
    status_code: 200
  retries: 8
  delay: 5
