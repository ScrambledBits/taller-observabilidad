---
# Playbook principal del taller de observabilidad.
# Un "playbook" de Ansible es la lista de tareas a ejecutar en uno o más servidores.
# Este playbook tiene un solo "play" que ejecuta 7 roles en el nodo de monitoreo.
#
# HOSTS:
#   "monitoring" es el nombre del host definido en ansible/inventario_terraform.yaml.
#   Ese archivo fue generado automáticamente por Terraform con la IP real de la EC2.
#
# BECOME:
#   become: true significa que Ansible ejecutará las tareas como root usando sudo.
#   Es equivalente a hacer `sudo` antes de cada comando. Necesario para:
#     - Instalar paquetes con apt
#     - Copiar archivos a /etc/ y /usr/local/bin/
#     - Crear usuarios del sistema
#     - Gestionar servicios con systemctl
#
# ORDEN DE LOS ROLES:
#   El orden importa porque existen dependencias entre roles:
#
#   1. common       → prepara el SO base (paquetes, usuario observability, grupo systemd-journal)
#                     DEBE ir primero porque todos los demás roles dependen del usuario
#
#   2. node_exporter → instala métricas del SO; necesita el usuario observability (de common)
#
#   3. prometheus   → instala el motor de métricas; necesita node_exporter corriendo para
#                     que el job "node-monitoring" aparezca UP inmediatamente
#
#   4. loki         → instala el motor de logs; debe estar corriendo antes de promtail
#                     para que promtail pueda enviarle logs al iniciar
#
#   5. grafana      → interfaz de visualización; necesita que prometheus y loki estén
#                     corriendo para que los datasources funcionen al verificar
#
#   6. alertmanager → recibe alertas de prometheus; puede instalarse en cualquier orden
#                     después de prometheus, pero antes de que los estudiantes editen
#                     el alertmanager.yml (TODO #7)
#
#   7. promtail     → envía logs a loki; DEBE ir después de loki para que pueda conectar

- name: Provisionar nodo de monitoreo
  hosts: monitoring
  become: true
  roles:
    - common
    - node_exporter
    - prometheus
    - loki
    - grafana
    - alertmanager
    - promtail
